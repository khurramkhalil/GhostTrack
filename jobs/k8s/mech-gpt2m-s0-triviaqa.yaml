# GhostTrack — GPT-2 Medium | Seed 0 | TriviaQA (model-generated hallucinations)
#
# Why TriviaQA instead of TruthfulQA:
#   TruthfulQA is calibrated for GPT-3+. GPT-2 Medium hallucinated on 95.3%
#   of it (38 factual out of 817 questions) — AUROC 0.56, detector just predicts
#   "hallucinated" for everything.  TriviaQA factoid questions give small models
#   a ~15-20% correct rate → ~450-600 factual examples from 3000 questions.
#
# Pipeline:
#   1. data   — load GPT-2 Medium, generate + label 3000 TriviaQA completions
#               (prompt: "Question: {q}\nAnswer:", max_new_tokens=32)
#               cached to /data/datasets/triviaqa_gpt2-medium.json
#   2. track  — hypothesis tracker on 3000 examples using existing SAE ckpts
#   3. detect — RandomForest with class_weight=balanced, reports AUROC
#
# REQUIRES: ghosttrack-gpt2m-s0-sae Completed
#
# Submit: kubectl apply -f jobs/k8s/mech-gpt2m-s0-triviaqa.yaml
# Logs:   kubectl logs -f -l job-name=ghosttrack-gpt2m-s0-triviaqa -n gp-engine-mizzou-dcps
# Delete: kubectl delete job ghosttrack-gpt2m-s0-triviaqa -n gp-engine-mizzou-dcps

apiVersion: batch/v1
kind: Job
metadata:
  name: ghosttrack-gpt2m-s0-triviaqa
  namespace: gp-engine-mizzou-dcps
  labels:
    app: ghosttrack-gpt2m-s0-triviaqa
    project: ghosttrack
    phase: triviaqa-trackdetect
    model: gpt2-medium
    seed: "0"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ghosttrack-gpt2m-s0-triviaqa
        project: ghosttrack
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-80GB-PCIe
                - NVIDIA-GH200-480GB
                - NVIDIA-H200-NVL
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-PCIE-40GB
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A6000
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ghosttrack
        image: khurramkhalil/ghosttrack:latest
        imagePullPolicy: Always
        workingDir: /workspace/GhostTrack
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            echo "=== GhostTrack: TriviaQA | GPT-2 Medium | Seed 0 ==="
            python3 -c '
            import urllib.request
            base = "https://raw.githubusercontent.com/khurramkhalil/GhostTrack/main/"
            files = [
              ("ghosttrack/tracking/extractor.py",        "/workspace/GhostTrack/ghosttrack/tracking/extractor.py"),
              ("ghosttrack/data/__init__.py",              "/workspace/GhostTrack/ghosttrack/data/__init__.py"),
              ("ghosttrack/data/triviaqa_generator.py",   "/workspace/GhostTrack/ghosttrack/data/triviaqa_generator.py"),
              ("ghosttrack/detection/detector.py",        "/workspace/GhostTrack/ghosttrack/detection/detector.py"),
              ("scripts/run_mechanism_study.py",          "/workspace/GhostTrack/scripts/run_mechanism_study.py"),
            ]
            [(urllib.request.urlretrieve(base+s, d), print("OK", s)) for s, d in files]
            '
            nvidia-smi

            echo "=== Step 1: Generate TriviaQA completions (3000 questions, cached) ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase data \
              --dataset triviaqa \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_triviaqa \
              --data-dir /data/datasets \
              --seed 0 \
              --device cuda

            echo "=== Step 2: Run hypothesis tracker ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase track \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_triviaqa \
              --data-dir /data/datasets \
              --sae-checkpoint-dir /data/sae_checkpoints/gpt2_medium \
              --seed 0 \
              --device cuda

            echo "=== Step 3: Fit detector ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase detect \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_triviaqa \
              --seed 0

            echo "=== Done ==="
        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "1"
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "1"
        envFrom:
        - secretRef:
            name: ghosttrack-secrets
        - configMapRef:
            name: ghosttrack-config
        volumeMounts:
        - mountPath: /data
          name: ghosttrack-data
        - mountPath: /dev/shm
          name: dshm
      volumes:
      - name: ghosttrack-data
        persistentVolumeClaim:
          claimName: ghosttrack-data
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
