# GhostTrack — Phi-3.5-mini-instruct | Seed 0 | HaluEval Track + Detect
#
# Reuses SAE checkpoints from the phi35 triviaqa run (once complete).
# Runs data (HaluEval) → track → detect.
#
# REQUIRES: /data/sae_checkpoints/phi35_instruct/ exists
#
# Submit: kubectl apply -f jobs/k8s/mech-phi35-s0-halueval.yaml
# Logs:   kubectl logs -f -l job-name=ghosttrack-phi35-s0-halueval -n gp-engine-mizzou-dcps

apiVersion: batch/v1
kind: Job
metadata:
  name: ghosttrack-phi35-s0-halueval
  namespace: gp-engine-mizzou-dcps
  labels:
    app: ghosttrack-phi35-s0-halueval
    project: ghosttrack
    phase: trackdetect
    model: phi-3.5-mini-instruct
    seed: "0"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ghosttrack-phi35-s0-halueval
        project: ghosttrack
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-80GB-PCIe
                - NVIDIA-A100-PCIE-40GB
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A6000
                - NVIDIA-GH200-480GB
                - NVIDIA-H200-NVL
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-80GB-PCIe
                - NVIDIA-GH200-480GB
                - NVIDIA-H200-NVL
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-PCIE-40GB
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A6000
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ghosttrack
        image: khurramkhalil/ghosttrack:latest
        imagePullPolicy: Always
        workingDir: /workspace/GhostTrack
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            echo "=== GhostTrack: HaluEval Track+Detect | Phi-3.5-mini-instruct | Seed 0 ==="
            pip install -U transformers -q
            python3 -c '
            import urllib.request
            base = "https://raw.githubusercontent.com/khurramkhalil/GhostTrack/main/"
            files = [
              ("ghosttrack/tracking/extractor.py",       "/workspace/GhostTrack/ghosttrack/tracking/extractor.py"),
              ("ghosttrack/data/__init__.py",             "/workspace/GhostTrack/ghosttrack/data/__init__.py"),
              ("ghosttrack/detection/detector.py",       "/workspace/GhostTrack/ghosttrack/detection/detector.py"),
              ("scripts/run_mechanism_study.py",         "/workspace/GhostTrack/scripts/run_mechanism_study.py"),
              ("config/model_configs/phi-3.5-mini-instruct.yaml", "/workspace/GhostTrack/config/model_configs/phi-3.5-mini-instruct.yaml"),
            ]
            [(urllib.request.urlretrieve(base+s, d), print("OK", s)) for s, d in files]
            '
            nvidia-smi

            MODEL="microsoft/Phi-3.5-mini-instruct"
            CONFIG="config/model_configs/phi-3.5-mini-instruct.yaml"
            OUT_DIR="/data/experiments/phase2_mechanism/phi35_instruct_s0_halueval"
            SAE_DIR="/data/sae_checkpoints/phi35_instruct"

            echo "=== Step 1: Load HaluEval dataset ==="
            python scripts/run_mechanism_study.py \
              --model "$MODEL" \
              --config "$CONFIG" \
              --phase data \
              --dataset halueval \
              --halueval-split qa \
              --output-dir "$OUT_DIR" \
              --data-dir /data/datasets \
              --seed 0 \
              --device cuda

            echo "=== Step 2: Run hypothesis tracker ==="
            python scripts/run_mechanism_study.py \
              --model "$MODEL" \
              --config "$CONFIG" \
              --phase track \
              --output-dir "$OUT_DIR" \
              --data-dir /data/datasets \
              --sae-checkpoint-dir "$SAE_DIR" \
              --seed 0 \
              --device cuda

            echo "=== Step 3: Fit detector ==="
            python scripts/run_mechanism_study.py \
              --model "$MODEL" \
              --config "$CONFIG" \
              --phase detect \
              --output-dir "$OUT_DIR" \
              --seed 0

            echo "=== Done ==="
        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "48Gi"
            cpu: "2"
          limits:
            nvidia.com/gpu: 1
            memory: "48Gi"
            cpu: "2"
        envFrom:
        - secretRef:
            name: ghosttrack-secrets
        - configMapRef:
            name: ghosttrack-config
        volumeMounts:
        - mountPath: /data
          name: ghosttrack-data
        - mountPath: /dev/shm
          name: dshm
      volumes:
      - name: ghosttrack-data
        persistentVolumeClaim:
          claimName: ghosttrack-data
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
