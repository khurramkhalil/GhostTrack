# GhostTrack — GPT-2 Medium | Seed 0 | TruthfulQA (model-generated hallucinations)
# This is the METHODOLOGICALLY CORRECT experiment: completions are generated by
# GPT-2 Medium itself, then labeled factual/hallucinated by string-match against
# TruthfulQA correct answers.  Contrast with mech-gpt2m-s0-trackdetect.yaml which
# uses human-written HaluEval answers (reviewer-visible flaw).
#
# Pipeline:
#   1. data   — load GPT-2 Medium, generate + label 817 TruthfulQA completions,
#               cache to /data/datasets/truthfulqa_gpt2-medium.json (reused by seeds 1-4)
#   2. track  — run hypothesis tracker on the 817 examples using existing SAE ckpts
#   3. detect — fit RandomForest detector, report AUROC
#
# REQUIRES: ghosttrack-gpt2m-s0-sae Completed (SAE checkpoints must exist)
#
# Memory sizing (why 16Gi):
#   Model on GPU: ~1.4 GB (345M params FP16)
#   24 SAE checkpoints on GPU: 24 × 40 MB = 960 MB
#   Only 817 examples → feature matrix is tiny (<1 MB)
#   CPU RAM peak: ~6 GiB → 6/16 = 38% ✓
#   Any GPU with ≥4 GB works; preferred A100 for throughput.
#
# Submit: kubectl apply -f jobs/k8s/mech-gpt2m-s0-tqa.yaml
# Logs:   kubectl logs -f -l job-name=ghosttrack-gpt2m-s0-tqa -n gp-engine-mizzou-dcps
# Delete: kubectl delete job ghosttrack-gpt2m-s0-tqa -n gp-engine-mizzou-dcps

apiVersion: batch/v1
kind: Job
metadata:
  name: ghosttrack-gpt2m-s0-tqa
  namespace: gp-engine-mizzou-dcps
  labels:
    app: ghosttrack-gpt2m-s0-tqa
    project: ghosttrack
    phase: tqa-trackdetect
    model: gpt2-medium
    seed: "0"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ghosttrack-gpt2m-s0-tqa
        project: ghosttrack
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-80GB-PCIe
                - NVIDIA-GH200-480GB
                - NVIDIA-H200-NVL
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-PCIE-40GB
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A6000
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ghosttrack
        image: khurramkhalil/ghosttrack:latest
        imagePullPolicy: Always
        workingDir: /workspace/GhostTrack
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            echo "=== GhostTrack: TruthfulQA | GPT-2 Medium | Seed 0 ==="
            python3 -c '
            import urllib.request
            base = "https://raw.githubusercontent.com/khurramkhalil/GhostTrack/main/"
            files = [
              ("ghosttrack/tracking/extractor.py",        "/workspace/GhostTrack/ghosttrack/tracking/extractor.py"),
              ("ghosttrack/data/truthfulqa_generator.py", "/workspace/GhostTrack/ghosttrack/data/truthfulqa_generator.py"),
              ("ghosttrack/detection/detector.py",        "/workspace/GhostTrack/ghosttrack/detection/detector.py"),
              ("scripts/run_mechanism_study.py",          "/workspace/GhostTrack/scripts/run_mechanism_study.py"),
            ]
            [(urllib.request.urlretrieve(base+s, d), print("OK", s)) for s, d in files]
            '
            nvidia-smi

            echo "=== Step 1: Generate TruthfulQA completions (cached after first run) ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase data \
              --dataset truthfulqa \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_tqa \
              --data-dir /data/datasets \
              --seed 0 \
              --device cuda

            echo "=== Step 2: Run hypothesis tracker on 817 TruthfulQA examples ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase track \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_tqa \
              --data-dir /data/datasets \
              --sae-checkpoint-dir /data/sae_checkpoints/gpt2_medium \
              --seed 0 \
              --device cuda

            echo "=== Step 3: Fit detector ==="
            python scripts/run_mechanism_study.py \
              --model gpt2-medium \
              --config config/model_configs/gpt2-medium.yaml \
              --phase detect \
              --output-dir /data/experiments/phase2_mechanism/gpt2_medium_s0_tqa \
              --seed 0

            echo "=== Done ==="
        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "1"
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "1"
        envFrom:
        - secretRef:
            name: ghosttrack-secrets
        - configMapRef:
            name: ghosttrack-config
        volumeMounts:
        - mountPath: /data
          name: ghosttrack-data
        - mountPath: /dev/shm
          name: dshm
      volumes:
      - name: ghosttrack-data
        persistentVolumeClaim:
          claimName: ghosttrack-data
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
